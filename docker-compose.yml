services:
  backend:
    build:
      context: ./backend
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-sqlite+aiosqlite:///./data/re7.db}
      APP_PUBLIC_ORIGIN: ${APP_PUBLIC_ORIGIN:-http://localhost:3000}
      API_PUBLIC_ORIGIN: ${API_PUBLIC_ORIGIN:-http://localhost:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000"]}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,backend,frontend}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID:-}
      WORKOS_API_KEY: ${WORKOS_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-use-a-real-secret-key}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      BACKEND_PROXY_TARGET: ${BACKEND_PROXY_TARGET:-http://backend:8000}
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost,127.0.0.1}
      VITE_WORKOS_CLIENT_ID: ${VITE_WORKOS_CLIENT_ID:-}
      VITE_WORKOS_DEV_MODE: ${VITE_WORKOS_DEV_MODE:-}
      VITE_WORKOS_REDIRECT_URI: ${VITE_WORKOS_REDIRECT_URI:-http://localhost:3000/callback}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_uploads:
