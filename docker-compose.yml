services:
  backend:
    build:
      context: ./backend
    container_name: re7-backend
    working_dir: /app
    environment:
      ENVIRONMENT: development
      DATABASE_URL: sqlite+aiosqlite:///./re7.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: re7-frontend
    working_dir: /app
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
      VITE_WORKOS_CLIENT_ID: ${WORKOS_CLIENT_ID}
      VITE_WORKOS_REDIRECT_URI: ${VITE_WORKOS_REDIRECT_URI:-http://localhost:3000/callback}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
